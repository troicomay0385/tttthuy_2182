<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Thực hành Bảo mật thông tin nâng cao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        body {
            background-color: #ffffff;   
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            color: #111111;
        }
        .container {
            max-width: 720px;
            padding: 3.5rem 1rem;
        }
        .logo {
            display: block;
            margin: 0 auto 2.5rem;
            width: 320px;
            max-width: 90%;
        }
        h4 {
            font-weight: 700;
            color: #0f7325;
            text-align: center;
            margin-bottom: 3.5rem;
            font-size: 2rem;
        }
        .btn-cipher {
            display: block;
            width: 100%;
            max-width: 420px;
            margin: 1.2rem auto;
            padding: 1rem 1.6rem;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            background-color: #56a952;      
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(72, 198, 125, 0.25);
        }
        .btn-cipher:hover {
            background-color: #27894e;      
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(10, 106, 29, 0.35);
        }
        .btn-cipher:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(9, 92, 34, 0.25);
        }
        .list-unstyled {
            padding: 0;
        }
    </style>
</head>
<body>

<div class="container text-center">

    <img src="https://file1.hutech.edu.vn/file/editor/homepage/stories/hinh34/logo%20CMYK-01.png" 
         alt="HUTECH Logo" class="logo">

    <h4>BÀI THỰC HÀNH BẢO MẬT THÔNG TIN NÂNG CAO</h4>

    <ul class="list-unstyled">
        <li>
            <a href="/caesar" class="btn btn-cipher">Caesar Cipher</a>
        </li>
        <li>
            <a href="/vigenere" class="btn btn-cipher">Vigenère Cipher</a>
        </li>
        <li>
            <a href="/railfence" class="btn btn-cipher">Rail Fence Cipher</a>
        </li>
        <li>
            <a href="/playfair" class="btn btn-cipher">Playfair Cipher</a>
        </li>
        <li>
            <a href="/transposition" class="btn btn-cipher">Transposition Cipher</a>
        </li>
    </ul>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
